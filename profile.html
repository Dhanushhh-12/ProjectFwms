<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Food Waste Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/logo.png.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Simple & Professional Profile Styling */
        body {
            background-color: var(--neutral-50);
            background-image:
                radial-gradient(at 0% 0%, hsla(var(--h), 72%, 29%, 0.05) 0, transparent 50%),
                radial-gradient(at 100% 100%, hsla(30, 90%, 50%, 0.05) 0, transparent 50%);
            min-height: 100vh;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: var(--shadow-xl);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.15);
        }

        .profile-photo-wrapper {
            position: relative;
            display: inline-block;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .profile-photo-wrapper:hover {
            transform: scale(1.08);
        }

        .photo-inner {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: var(--neutral-100);
            border: 4px solid white;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 25px 0;
        }

        .stat-badge {
            background: white;
            padding: 12px;
            border-radius: var(--radius-md);
            border: 1px solid var(--neutral-100);
            transition: all 0.3s ease;
        }

        .stat-badge:hover {
            border-color: var(--primary-light);
            transform: scale(1.05);
            background: var(--primary-soft);
        }

        .stat-val {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
            display: block;
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .profile-field {
            background: white;
            border-radius: var(--radius-md);
            padding: 15px 20px;
            border: 1px solid var(--neutral-200);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            text-align: left;
        }

        .profile-field:hover {
            border-color: var(--primary);
            background: var(--primary-soft);
            transform: scale(1.02);
        }

        .field-icon {
            background: var(--primary-soft);
            color: var(--primary);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .field-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .field-value {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
            margin: 0;
        }

        .btn {
            padding: 14px 28px;
            border-radius: var(--radius-md);
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-logout {
            background: #fee2e2;
            color: #ef4444;
            border: 1px solid #fecaca;
        }

        .btn-logout:hover {
            background: #ef4444;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <nav id="mainNav" class="glass-nav">
                <a href="index.html" class="logo">
                    <img src="images/logo.png.png" alt="FWMS Logo"> FWMS
                </a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="donor.html">Donor</a></li>
                    <li><a href="volunteer.html">Volunteer</a></li>
                </ul>
                <button class="mobile-menu-btn">☰</button>
            </nav>
        </div>
    </header>

    <main>
        <section class="profile-section" style="padding: 120px 0 80px;">
            <div class="container animate-fade-in">
                <div class="profile-card"
                    style="max-width: 550px; margin: 0 auto; padding: 40px; border-radius: 24px; text-align: center;">

                    <div style="margin-bottom: 30px;">
                        <h2 style="font-size: 2.2rem; font-weight: 800; color: var(--neutral-900);">My Profile</h2>
                        <p style="color: var(--text-muted);">Donor Account Settings</p>
                    </div>

                    <div style="margin-bottom: 30px;">
                        <input type="file" id="updatePhoto" accept="image/*" style="display: none;">
                        <div class="profile-photo-wrapper">
                            <div class="photo-inner" id="profilePhotoDisplay">
                                <span style="font-size: 3.5rem; color: var(--neutral-200);">👤</span>
                            </div>
                            <label for="updatePhoto" title="Update Photo"
                                style="position: absolute; bottom: 5px; right: 5px; background: var(--primary); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-md); cursor: pointer; border: 3px solid white;">
                                📸
                            </label>
                        </div>
                    </div>
                    <!-- 
                    <div class="stats-grid">
                        <div class="stat-badge">
                            <span class="stat-val">12</span>
                            <span class="stat-label">Donations</span>
                        </div>
                        <div class="stat-badge">
                            <span class="stat-val">450kg</span>
                            <span class="stat-label">Impact</span>
                        </div>
                        <div class="stat-badge">
                            <span class="stat-val">Gold</span>
                            <span class="stat-label">Tier</span>
                        </div>
                    </div> -->

                    <div style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px;">
                        <div class="profile-field">
                            <div class="field-icon">👤</div>
                            <div class="field-content">
                                <label class="field-label">Full Name</label>
                                <p id="profileName" class="field-value"></p>
                            </div>
                        </div>

                        <div class="profile-field">
                            <div class="field-icon">✉️</div>
                            <div class="field-content">
                                <label class="field-label">Email Address</label>
                                <p id="profileEmail" class="field-value"></p>
                            </div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 20px; justify-content: center; margin-top: 20px;">
                        <button id="saveProfileBtn" class="btn btn-primary"
                            style="padding: 14px 40px; border-radius: 12px;">
                            Save Changes
                        </button>
                        <button id="logoutBtnProfile" class="btn btn-logout"
                            style="padding: 14px 40px; border-radius: 12px;">
                            Logout
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Food Waste Management System - Telangana Chapter. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script>
        // Profile specific initialization
        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const nameEl = document.getElementById('profileName');
            const emailEl = document.getElementById('profileEmail');
            const photoDisplay = document.getElementById('profilePhotoDisplay');
            const updatePhotoInput = document.getElementById('updatePhoto');
            const saveBtn = document.getElementById('saveProfileBtn');

            nameEl.innerText = user.name;
            emailEl.innerText = user.email;

            if (user.photo) {
                photoDisplay.innerHTML = `<img src="${user.photo}" style="width: 100%; height: 100%; object-fit: cover;">`;
            }

            updatePhotoInput.addEventListener('change', function () {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        const base64Photo = e.target.result;
                        photoDisplay.innerHTML = `<img src="${base64Photo}" style="width: 100%; height: 100%; object-fit: cover;">`;

                        // Update in storage immediately for preview consistency
                        user.photo = base64Photo;
                        // We'll save it to the users list in script.js logic or here
                    };
                    reader.readAsDataURL(file);
                }
            });

            saveBtn.addEventListener('click', () => {
                // Find and update user in global users list
                const users = getUsers();
                const index = users.findIndex(u => u.email === user.email);
                if (index !== -1) {
                    users[index] = user;
                    localStorage.setItem(USERS_KEY, JSON.stringify(users));
                }
                localStorage.setItem(SESSION_KEY, JSON.stringify(user));

                alert('Profile updated successfully!');
                window.location.href = 'index.html';
            });

            const logoutBtn = document.getElementById('logoutBtnProfile');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    localStorage.removeItem(SESSION_KEY);
                    alert('Logged out successfully.');
                    window.location.href = 'index.html';
                });
            }
        });
    </script>
</body>

</html>

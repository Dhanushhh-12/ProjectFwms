<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Founder Dashboard - FWMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .dashboard-container {
            padding: 120px 20px 60px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            padding: 25px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .stat-card p {
            color: var(--text-muted);
            font-weight: 500;
        }

        .request-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .request-card:hover {
            transform: translateY(-5px);
        }

        .request-img {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            object-fit: cover;
        }

        .request-info {
            flex: 1;
        }

        .request-info h4 {
            font-size: 1.25rem;
            margin-bottom: 5px;
        }

        .request-meta {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .tag-pending {
            background: #fff8e1;
            color: #f57f17;
        }

        .tag-collected {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .timer-badge {
            background: #fdf2f2;
            color: #ef4444;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-family: monospace;
        }

        .distance-badge {
            background: #eff6ff;
            color: #2563eb;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
        }

        .btn-done {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-done:hover {
            background: var(--primary-dark);
            box-shadow: 0 5px 15px rgba(46, 125, 50, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <nav class="glass-nav">
                <a href="index.html" class="logo">
                    <img src="images/logo.png" alt="FWMS Logo"> FWMS
                </a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="founder.html" class="active">Dashboard</a></li>
                    <li><a href="logout.html" id="dashboardLogout" style="color: #ff4444;">Logout</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="dashboard-container">
        <div class="section-title animate-fade-in">
            <h2>Founder Dashboard</h2>
            <p>Track and manage real-time food recovery requests across Telangana.</p>
        </div>

        <div class="stats-grid stagger-parent">
            <div class="stat-card glass-card">
                <h3 id="activeCount">0</h3>
                <p>Active Requests</p>
            </div>
            <div class="stat-card glass-card">
                <h3 id="completedCount">0</h3>
                <p>Donations Collected</p>
            </div>
            <div class="stat-card glass-card">
                <h3 id="totalImpact">0kg</h3>
                <p>Total Food Saved</p>
            </div>
        </div>

        <div class="dashboard-sections">
            <div id="activeRequests">
                <h3 style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                    Active Tracking <span class="pulse"
                        style="width:10px; height:10px; background:red; border-radius:50%;"></span>
                </h3>
                <div id="requestsList">
                    <!-- Dynamic Requests go here -->
                    <div class="empty-state">No active donation requests at the moment.</div>
                </div>
            </div>

            <div id="historySection" style="margin-top: 60px;">
                <h3 style="margin-bottom: 20px;">Recent History</h3>
                <div id="historyList">
                    <!-- Completed requests go here -->
                </div>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
    <script>
        // Founder Dashboard Specific Logic
        document.addEventListener('DOMContentLoaded', () => {
            const list = document.getElementById('requestsList');
            const history = document.getElementById('historyList');

            const renderDashboard = () => {
                const donations = JSON.parse(localStorage.getItem('fwms_donations') || '[]');
                const active = donations.filter(d => d.status === 'pending');
                const completed = donations.filter(d => d.status === 'collected');

                document.getElementById('activeCount').innerText = active.length;
                document.getElementById('completedCount').innerText = completed.length;
                document.getElementById('totalImpact').innerText = (completed.length * 5) + 'kg'; // Mock impact

                // Render Active
                if (active.length > 0) {
                    list.innerHTML = active.map(d => `
                        <div class="request-card glass-card animate-fade-in" id="req-${d.id}">
                            <img src="${d.foodPhoto || 'https://via.placeholder.com/100'}" class="request-img">
                            <div class="request-info">
                                <h4>${d.donorName} <span class="tag tag-pending">Pending</span></h4>
                                <p style="margin-bottom: 8px;">${d.description}</p>
                                <div class="request-meta">
                                    <span>📍 ${d.location}</span>
                                    <span class="distance-badge">${getMockDistance(d.location)}</span>
                                    <span class="timer-badge" data-time="${d.timestamp}">00:00:00</span>
                                </div>
                            </div>
                            <button class="btn-done" onclick="markAsCollected(${d.id})">Collected</button>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<div class="empty-state">No active donation requests at the moment.</div>';
                }

                // Render History
                history.innerHTML = completed.slice(-5).reverse().map(d => `
                    <div class="request-card glass-card" style="opacity: 0.7; transform: scale(0.98);">
                        <img src="${d.foodPhoto || 'https://via.placeholder.com/100'}" class="request-img" style="filter: grayscale(1);">
                        <div class="request-info">
                            <h4>${d.donorName} <span class="tag tag-collected">Collected</span></h4>
                            <p>${d.description}</p>
                            <div class="request-meta">
                                <span>📍 ${d.location}</span>
                                <span>Collected at: ${new Date(d.collectedAt).toLocaleTimeString()}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            };

            const updateTimers = () => {
                document.querySelectorAll('.timer-badge').forEach(badge => {
                    const start = new Date(badge.dataset.time);
                    const now = new Date();
                    const diff = Math.floor((now - start) / 1000);

                    const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                    const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                    const s = (diff % 60).toString().padStart(2, '0');

                    badge.innerText = `${h}:${m}:${s}`;
                });
            };

            window.markAsCollected = (id) => {
                const donations = JSON.parse(localStorage.getItem('fwms_donations') || '[]');
                const idx = donations.findIndex(d => d.id === id);
                if (idx !== -1) {
                    donations[idx].status = 'collected';
                    donations[idx].collectedAt = new Date().toISOString();
                    localStorage.setItem('fwms_donations', JSON.stringify(donations));

                    // Visual feedback
                    const card = document.getElementById('req-' + id);
                    if (card) {
                        card.style.transform = 'translateX(100px)';
                        card.style.opacity = '0';
                        setTimeout(renderDashboard, 300);
                    } else {
                        renderDashboard();
                    }
                }
            };

            const getMockDistance = (loc) => {
                const locations = {
                    'Hyderabad': '1.2 KM',
                    'Warangal': '145 KM',
                    'Karimnagar': '164 KM',
                    'Nizamabad': '176 KM'
                };
                return locations[loc.split(',')[0].trim()] || (Math.floor(Math.random() * 50) + 2) + ' KM';
            };

            renderDashboard();
            setInterval(updateTimers, 1000);

            // Listen for storage changes to update live
            window.addEventListener('storage', (e) => {
                if (e.key === 'fwms_donations') renderDashboard();
            });

            document.getElementById('dashboardLogout').addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('fwms_current_user');
                window.location.href = 'index.html';
            });
        });
    </script>
</body>

</html>

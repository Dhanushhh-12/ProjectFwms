<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Profile - FWMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/logo.png.png">
    <style>
        body {
            background: var(--neutral-50);
        }

        .profile-page {
            padding: 120px 0 80px;
        }

        .profile-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 32px;
            align-items: start;
            max-width: 960px;
            margin: 0 auto;
        }

        .profile-sidebar-card {
            background: var(--surface);
            border: 1px solid var(--neutral-100);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 100px;
        }

        .profile-cover {
            height: 120px;
            background: linear-gradient(135deg, #E65100, #F57C00, #FB8C00);
            position: relative;
        }

        .profile-avatar-wrap {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--surface);
            background: var(--neutral-100);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: var(--shadow-md);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-avatar-edit {
            position: absolute;
            bottom: 2px;
            right: -4px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #E65100;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .9rem;
            border: 2px solid var(--surface);
            cursor: pointer;
            box-shadow: var(--shadow-md);
        }

        .profile-sidebar-body {
            padding: 70px 24px 28px;
            text-align: center;
        }

        .profile-name-big {
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--neutral-900);
            margin-bottom: 4px;
        }

        .profile-email-small {
            font-size: .82rem;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .profile-role-badge {
            display: inline-block;
            background: #FFF3E0;
            color: #E65100;
            border-radius: 50px;
            padding: 4px 14px;
            font-size: .75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: 24px;
        }

        .profile-mini-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .mini-stat {
            background: var(--neutral-50);
            border: 1px solid var(--neutral-100);
            border-radius: var(--radius-sm);
            padding: 14px 10px;
            text-align: center;
        }

        .mini-stat-num {
            display: block;
            font-size: 1.4rem;
            font-weight: 900;
            color: #E65100;
            font-family: 'Outfit', sans-serif;
        }

        .mini-stat-label {
            font-size: .68rem;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--text-muted);
        }

        .profile-main {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .profile-section-card {
            background: var(--surface);
            border: 1px solid var(--neutral-100);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-md);
        }

        .section-card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 24px;
        }

        .section-card-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: #FFF3E0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .info-field {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border: 1px solid var(--neutral-100);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            transition: var(--transition);
        }

        .info-field:hover {
            border-color: #E65100;
            background: #FFF3E0;
        }

        .info-field-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: #FFF3E0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .info-field-label {
            font-size: .68rem;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 2px;
        }

        .info-field-val {
            font-size: .95rem;
            font-weight: 600;
            color: var(--neutral-900);
        }

        /* Deliveries History */
        .delivery-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 16px;
            border: 1px solid var(--neutral-100);
            border-radius: var(--radius-md);
            margin-bottom: 10px;
            transition: var(--transition);
        }

        .delivery-item:hover {
            border-color: #E65100;
            background: #FFF3E0;
        }

        .delivery-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #FFF3E0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .btn-save-vol {
            background: #E65100;
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            padding: 12px 28px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 14px rgba(230, 81, 0, .3);
            font-size: .9rem;
        }

        .btn-save-vol:hover {
            background: #EF6C00;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #FEE2E2;
            color: #EF4444;
            border: 1px solid #FECACA;
            border-radius: var(--radius-md);
            padding: 12px 24px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-size: .9rem;
        }

        .btn-danger:hover {
            background: #EF4444;
            color: #fff;
        }

        @media(max-width:768px) {
            .profile-layout {
                grid-template-columns: 1fr;
            }

            .profile-sidebar-card {
                position: static;
            }
        }
    </style>
</head>

<body>
    <div id="scroll-progress"></div>
    <header>
        <div class="container">
            <nav id="mainNav" class="glass-nav">
                <a href="index.html" class="logo"><img src="images/logo.png.png" alt="FWMS"> FWMS</a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="volunteer.html" class="active">Dashboard</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu"><svg width="22" height="22"
                        viewBox="0 0 22 22" fill="none">
                        <rect y="4" width="22" height="2.5" rx="1.25" fill="currentColor" />
                        <rect y="10" width="22" height="2.5" rx="1.25" fill="currentColor" />
                        <rect y="16" width="22" height="2.5" rx="1.25" fill="currentColor" />
                    </svg></button>
            </nav>
        </div>
    </header>

    <main>
        <section class="profile-page">
            <div class="container">
                <div class="profile-layout">
                    <div class="profile-sidebar-card reveal">
                        <div class="profile-cover"></div>
                        <div class="profile-avatar-wrap">
                            <div class="profile-avatar" id="profilePhotoDisplay">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ccc"
                                    stroke-width="1.5" stroke-linecap="round">
                                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                                    <circle cx="12" cy="7" r="4" />
                                </svg>
                            </div>
                            <label for="updatePhoto" class="profile-avatar-edit" title="Update Photo">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5" stroke-linecap="round">
                                    <path
                                        d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" />
                                    <circle cx="12" cy="13" r="4" />
                                </svg>
                            </label>
                            <input type="file" id="updatePhoto" accept="image/*" style="display:none;">
                        </div>
                        <div class="profile-sidebar-body">
                            <div class="profile-name-big" id="profileNameSide">Loading...</div>
                            <div class="profile-email-small" id="profileEmailSide">—</div>
                            <div class="profile-role-badge">Volunteer</div>
                            <div class="profile-mini-stats">
                                <div class="mini-stat"><span class="mini-stat-num" id="statDeliveries">0</span><span
                                        class="mini-stat-label">Deliveries</span></div>
                                <div class="mini-stat"><span class="mini-stat-num" id="statRank">Volunteer</span><span
                                        class="mini-stat-label">Food</span></div>
                            </div>
                        </div>
                    </div>

                    <div class="profile-main">
                        <div class="profile-section-card reveal">
                            <div class="section-card-title" style="color:#E65100">
                                <div class="section-card-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#E65100"
                                        stroke-width="2" stroke-linecap="round">
                                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                                        <circle cx="12" cy="7" r="4" />
                                    </svg>
                                </div>Volunteer Information
                            </div>
                            <div class="info-field">
                                <div class="info-field-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E65100"
                                        stroke-width="2" stroke-linecap="round">
                                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                                        <circle cx="12" cy="7" r="4" />
                                    </svg>
                                </div>
                                <div>
                                    <div class="info-field-label">Full Name</div>
                                    <div class="info-field-val" id="profileName">—</div>
                                </div>
                            </div>
                            <div class="info-field">
                                <div class="info-field-icon">✉️</div>
                                <div>
                                    <div class="info-field-label">Email Address</div>
                                    <div class="info-field-val" id="profileEmail">—</div>
                                </div>
                            </div>
                            <div class="info-field">
                                <div class="info-field-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E65100"
                                        stroke-width="2" stroke-linecap="round">
                                        <path
                                            d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.01 1.22 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.09a16 16 0 006 6l.36-.36a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 15z" />
                                    </svg>
                                </div>
                                <div>
                                    <div class="info-field-label">Phone</div>
                                    <div class="info-field-val" id="profilePhone">—</div>
                                </div>
                            </div>
                            <div style="display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;">
                                <button id="saveProfileBtn" class="btn-save-vol">Save Changes</button>
                                <button id="logoutBtnProfile" class="btn-danger">Sign Out</button>
                                <a href="volunteer.html" class="btn btn-secondary"
                                    style="text-decoration:none;padding:12px 20px;font-size:.88rem;">← Back to
                                    Dashboard</a>
                            </div>
                        </div>

                        <div class="profile-section-card reveal">
                            <div class="section-card-title" style="color:#E65100">
                                <div class="section-card-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#E65100"
                                        stroke-width="2" stroke-linecap="round">
                                        <rect x="1" y="3" width="15" height="13" rx="2" />
                                        <path d="M16 8h4l3 3v5h-7V8z" />
                                        <circle cx="5.5" cy="18.5" r="2.5" />
                                        <circle cx="18.5" cy="18.5" r="2.5" />
                                    </svg>
                                </div>Delivery Statistics
                            </div>
                            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;">
                                <div
                                    style="background:#FFF3E0;border-radius:var(--radius-md);padding:20px;text-align:center;">
                                    <span style="display:block;font-size:2rem;font-weight:900;color:#E65100;"
                                        id="statTotalBig">0</span>
                                    <span
                                        style="font-size:.75rem;color:var(--text-muted);text-transform:uppercase;">Total
                                        Deliveries</span>
                                </div>
                                <!-- <div
                                    style="background:#E8F5E9;border-radius:var(--radius-md);padding:20px;text-align:center;">
                                    <span style="display:block;font-size:2rem;font-weight:900;color:var(--primary);"
                                        id="statImpact">0</span>
                                    <span
                                        style="font-size:.75rem;color:var(--text-muted);text-transform:uppercase;">Meals
                                        Delivered</span>
                                </div> -->
                                <!-- <div
                                    style="background:#EDE7F6;border-radius:var(--radius-md);padding:20px;text-align:center;">
                                    <span style="display:block;font-size:2rem;font-weight:900;color:#7B1FA2;"
                                        id="statRankBig">🥉</span>
                                    <span
                                        style="font-size:.75rem;color:var(--text-muted);text-transform:uppercase;">Rank</span>
                                </div> -->
                            </div>
                            <div id="deliveryProgressSection">
                                <!-- <div
                                    style="font-size:.85rem;color:var(--text-muted);font-weight:600;margin-bottom:10px;">
                                    Progress to next rank</div> -->
                                <div
                                    style="background:var(--neutral-100);border-radius:50px;height:8px;overflow:hidden;">
                                    <div id="rankProgressBar"
                                        style="height:100%;background:linear-gradient(90deg,#E65100,#FB8C00);border-radius:50px;width:0%;transition:width 1s ease;">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container" style="text-align:center;">
            <p style="color:var(--neutral-200);opacity:.5;">© 2026 Food Waste Management System — All rights reserved.
            </p>
        </div>
    </footer>

    <script src="js/script.js?v=2.0"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = getVolunteerSession ? getVolunteerSession() : JSON.parse(localStorage.getItem('fwms_current_volunteer'));
            if (!user) { window.location.href = 'login.html'; return; }

            document.getElementById('profileNameSide').textContent = user.name;
            document.getElementById('profileEmailSide').textContent = user.email;
            document.getElementById('profileName').textContent = user.name;
            document.getElementById('profileEmail').textContent = user.email;
            document.getElementById('profilePhone').textContent = user.phone || 'Not provided';

            if (user.photo) {
                document.getElementById('profilePhotoDisplay').innerHTML = `<img src="${user.photo}" alt="Profile">`;
            }

            const deliveries = JSON.parse(localStorage.getItem('fwms_deliveries_completed') || '{}');
            const count = deliveries[user.email] || 0;
            document.getElementById('statDeliveries').textContent = count;
            document.getElementById('statTotalBig').textContent = count;
            document.getElementById('statImpact').textContent = count * 4;

            // Rank logic
            const rank = count >= 30 ? 'Gold' : count >= 10 ? 'Silver' : 'Rookie';
            const rankColor = count >= 30 ? '#F9A825' : count >= 10 ? '#78909C' : '#8D6E63';
            const next = count >= 30 ? 30 : count >= 10 ? 30 : 10;
            const progress = Math.min((count / next) * 100, 100);
            document.getElementById('statRank').textContent = rank;
            document.getElementById('statRankBig').textContent = rank;
            document.getElementById('statRankBig').style.color = rankColor;
            setTimeout(() => document.getElementById('rankProgressBar').style.width = progress + '%', 300);

            document.getElementById('updatePhoto').addEventListener('change', function () {
                const file = this.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = e => {
                    user.photo = e.target.result;
                    document.getElementById('profilePhotoDisplay').innerHTML = `<img src="${user.photo}" alt="Profile">`;
                };
                reader.readAsDataURL(file);
            });

            document.getElementById('saveProfileBtn').addEventListener('click', () => {
                const KEY = 'fwms_current_volunteer';
                localStorage.setItem(KEY, JSON.stringify(user));
                const btn = document.getElementById('saveProfileBtn');
                btn.textContent = 'Saved!';
                setTimeout(() => btn.textContent = 'Save Changes', 2000);
            });

            document.getElementById('logoutBtnProfile').addEventListener('click', () => {
                localStorage.removeItem('fwms_current_volunteer');
                window.location.href = 'index.html';
            });
        });
    </script>
</body>

</html>

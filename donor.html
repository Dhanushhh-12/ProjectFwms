<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Become a Donor - Food Waste Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<script>
    // Immediate auth check
    if (!localStorage.getItem('fwms_current_user')) {
        alert('Access denied. Please login first.');
        window.location.href = 'login.html';
    }
</script>

<body>
    <header>
        <div class="container">
            <nav class="glass-nav">
                <a href="index.html" class="logo">
                    <img src="images/logo.png.png" alt="FWMS Logo"> FWMS
                </a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="donor.html" class="active">Donor</a></li>
                </ul>
                <button class="mobile-menu-btn">☰</button>
            </nav>
        </div>
    </header>

    <main>
        <section class="donor-hero animate-fade-in"
            style="background-color: var(--dark-color); color: white; padding: 60px 0; text-align: center;">
            <div class="container">
                <h1 style="margin-top: 18px;">Add Food Donation</h1>
                <p>Fill out the form below to donate surplus food items.</p>
            </div>
        </section>

        <section class="donor-section">
            <div class="container">
                <div id="donorFormContainer" class="glass-card animate-zoom"
                    style="max-width: 800px; margin: 0 auto; padding: 40px; border-radius: 15px;">
                    <div style="margin-bottom: 30px; text-align: center;">
                        <h2 style="color: var(--primary-color);">Donation Details</h2>
                        <p style="color: var(--text-muted);">Please provide accurate information to help our volunteers
                            locate and collect the food.</p>
                    </div>

                    <form id="donorForm">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="form-group">
                                <label for="donorName">Donor/Restaurant Name</label>
                                <input type="text" id="donorName" name="donor_name" placeholder=" Enter Name" required>
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone Number</label>
                                <input type="tel" id="phone" name="phone" placeholder="+91 9876543210" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="location">Pickup Location </label>
                            <input type="text" id="location" name="location" placeholder="Location" required>
                        </div>

                        <div class="form-group" style="margin-top: 10px;">
                            <label for="foodImage">Food Picture for Evidence</label>
                            <!-- Removed name from original to prevent sending heavy file -->
                            <input type="file" id="foodImage" accept="image/*" required
                                style="border: 2px dashed #ddd; padding: 20px; background: #fafafa; cursor: pointer;">
                            <!-- Hidden input for compressed image -->
                            <input type="hidden" name="food_image" id="compressedImage">
                            <div id="imagePreview" style="margin-top: 15px; text-align: center;">
                                <!-- Live Image Preview appears here -->
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="description">Food Description & Quantity</label>
                            <textarea id="description" name="description" placeholder="Food Quantity"
                                required></textarea>
                        </div>



                        <button type="submit" class="btn btn-secondary"
                            style="width: 100%; font-size: 1.1rem; padding: 15px;">Submit Donation Request</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Food Waste Management System - All rights reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
